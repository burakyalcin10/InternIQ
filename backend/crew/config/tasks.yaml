culture_research_task:
  description: >
    Conduct a comprehensive culture research on {company}. Cover the
    following topics:

    1. Overall work culture and company values
    2. Intern and new graduate experiences
    3. Work-life balance and working conditions
    4. Career development opportunities
    5. Company reputation and position in the industry

    Focus your research on {company} within the Turkish market context.
    Write your findings in Turkish.
  expected_output: >
    A structured culture report in Markdown format (in Turkish):
    - Work Culture (2-3 paragraphs)
    - Intern Experience (key points)
    - Pros and Cons (bullet list)
    - Overall Assessment (1 paragraph)
  agent: culture_researcher

tech_analysis_task:
  description: >
    Perform an in-depth analysis of {company}'s technology infrastructure
    and engineering practices. Research the following:

    1. Programming languages and frameworks used
    2. Cloud infrastructure and DevOps practices
    3. Open-source contributions and GitHub activity
    4. Technical interview process and question types
    5. Technologies that interns will work with

    Evaluate findings from the perspective of a software engineering intern
    candidate applying to {company}. Write your analysis in Turkish.
  expected_output: >
    A structured technology report in Markdown format (in Turkish):
    - Technology Stack (detailed list with explanations)
    - Engineering Practices (code review, CI/CD, testing, etc.)
    - Interview Process (stages and preparation tips)
    - Recommended Technologies for Interns (priority learning list)
  agent: tech_analyst

compile_report_task:
  description: >
    Synthesize the findings from the Culture Researcher and Tech Analyst
    about {company} into a comprehensive company intelligence report.
    The report should contain the following sections:

    1. Company Summary (brief introduction)
    2. Culture and Work Environment
    3. Technology Stack
    4. Interview Preparation Guide
    5. Pros and Cons (from an intern's perspective)
    6. Overall Rating and Recommendation

    The report must contain concrete, actionable information to help
    intern candidates make informed decisions. Write in Turkish.
  expected_output: >
    A final report in JSON format (with Turkish content):
    {
      "company_summary": "2-3 sentence summary about the company",
      "culture": "Detailed description of culture and work environment",
      "tech_stack": ["Technology 1", "Technology 2", ...],
      "interview_tips": ["Tip 1", "Tip 2", ...],
      "pros": ["Pro 1", "Pro 2", ...],
      "cons": ["Con 1", "Con 2", ...],
      "overall_rating": "Score out of 10 with brief justification",
      "recommendation": "General advice for intern candidates"
    }
  agent: report_writer
